<!-- UCHU ADDON - COMMON HEADER -->
<header class="uchu-header">
    <nav class="uchu-nav">
        <a href="/UchuAddonWiki/" class="uchu-logo-link">
            <img src="/UchuAddonWiki/resource/UchuAddonTitleLogo.png" alt="Uchu Addon Logo" class="uchu-logo">
        </a>

        <ul class="uchu-nav-links">
            <li><a href="/UchuAddonWiki/" class="uchu-nav-link" data-i18n="nav.home">トップ</a></li>
            <li><a href="/UchuAddonWiki/roles/" class="uchu-nav-link" data-i18n="nav.roles">役職</a></li>
            <li><a href="/UchuAddonWiki/gallery/" class="uchu-nav-link" data-i18n="nav.gallery">ギャラリー</a></li>
            <li><a href="/UchuAddonWiki/inquiry/" class="uchu-nav-link" data-i18n="nav.inquiry">お問い合わせ</a></li>
            <li>
                <div class="lang-switcher" role="group" aria-label="Language" data-i18n-aria="nav.lang_switch_aria">
                    <button class="lang-switch-btn" data-lang="ja" type="button">JPN</button>
                    <button class="lang-switch-btn" data-lang="en" type="button">ENG</button>
                </div>
            </li>
            <li>
                <button class="theme-toggle" id="themeToggle" aria-label="ダークモード切り替え" data-i18n-aria="nav.theme_toggle_aria">
                    <i class="fas fa-moon" id="themeIcon"></i>
                </button>
            </li>
        </ul>
    </nav>
</header>

<script>
// アクティブナビリンク設定（theme.js が担当できないためここで実行）
(function () {
    const p = window.location.pathname;
    document.querySelectorAll('.uchu-nav-link').forEach(link => {
        const h = link.getAttribute('href');
        if ((p === '/UchuAddonWiki/' || p === '/UchuAddonWiki/index.html') && h === '/UchuAddonWiki/') link.classList.add('active');
        else if (p.includes('/roles/') && h.includes('/roles/')) link.classList.add('active');
        else if (p.includes('/gallery/') && h.includes('/gallery/')) link.classList.add('active');
        else if (p.includes('/inquiry/') && h.includes('/inquiry/')) link.classList.add('active');
    });
})();
</script>
