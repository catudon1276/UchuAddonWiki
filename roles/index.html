<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uchu Addon Wiki 役職</title>
    <meta property="og:title" content="UchuAddon Wiki - 役職一覧">
    <meta property="og:image" content="https://catudon1276.github.io/UchuAddonWiki/components/CoverIllust.png">
    <link rel="icon" type="image/png" href="../resource/UchuLogo.png">
    <link rel="stylesheet" href="../components/styles-common.css">
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        /* ------------------------------------------------
           Page header override
           ------------------------------------------------ */
        .uchu-section-title {
            color: var(--uchu-text-primary);
            background: none;
            -webkit-text-fill-color: unset;
        }

        /* ------------------------------------------------
           Search & Filter Panel
           ------------------------------------------------ */
        .search-filter-section {
            background: #FFFFFF;
            border: 1px solid var(--uchu-border);
            border-radius: var(--radius-xl);
            padding: var(--space-2xl);
            margin-bottom: var(--space-2xl);
            box-shadow: var(--shadow-sm);
        }

        .search-box {
            position: relative;
            margin-bottom: var(--space-xl);
        }

        .search-input {
            width: 100%;
            padding: var(--space-lg) var(--space-lg) var(--space-lg) 3.5rem;
            background: var(--uchu-bg-mid);
            border: 1.5px solid var(--uchu-border);
            border-radius: var(--radius-lg);
            font-size: 1rem;
            color: var(--uchu-text-primary);
            font-family: var(--font-body);
            transition: all 0.2s ease;
        }

        .search-input::placeholder {
            color: var(--uchu-text-muted);
        }

        .search-input:focus {
            outline: none;
            border-color: var(--uchu-primary);
            background: #FFFFFF;
            box-shadow: 0 0 0 3px rgba(91, 108, 246, 0.12);
        }

        .search-icon {
            position: absolute;
            left: var(--space-lg);
            top: 50%;
            transform: translateY(-50%);
            color: var(--uchu-text-muted);
            font-size: 1.1rem;
        }

        .filter-section {
            margin-bottom: var(--space-lg);
        }

        .filter-label {
            font-family: var(--font-heading);
            font-size: 0.72rem;
            font-weight: 700;
            margin-bottom: var(--space-md);
            color: var(--uchu-text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: var(--space-sm);
        }

        .filter-buttons {
            display: flex;
            gap: var(--space-sm);
            flex-wrap: wrap;
            justify-content: center;
        }

        .filter-btn, .from-btn {
            padding: 0.5rem var(--space-lg);
            background: var(--uchu-bg-mid);
            border: 1.5px solid var(--uchu-border);
            border-radius: 100px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 600;
            font-family: var(--font-heading);
            color: var(--uchu-text-secondary);
            font-size: 0.82rem;
            letter-spacing: 0.3px;
        }

        .filter-btn:hover, .from-btn:hover {
            border-color: var(--uchu-primary);
            color: var(--uchu-primary);
            background: rgba(91, 108, 246, 0.06);
        }

        .filter-btn.active, .from-btn.active {
            background: var(--uchu-text-primary); /* 黒色に変更 */
            border-color: var(--uchu-text-primary);
            color: #FFFFFF;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        /* ------------------------------------------------
           Role Card Entrance Animation
           ------------------------------------------------ */
        .role-card {
            opacity: 0;
            transform: translateY(12px);
        }
        .role-card.card-visible {
            opacity: 1;
            transform: translateY(0);
            transition: opacity 0.3s ease, transform 0.2s ease,
                        background 0.15s ease;
        }

        /* ------------------------------------------------
           Role List — Flat (no card boxes)
           ------------------------------------------------ */
        .roles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2px;
        }

        .role-card {
            background: transparent;
            border: none;
            border-radius: 0;
            padding: 12px 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 14px;
            transition: background 0.15s ease, transform 0.2s ease;
            position: relative;
        }

        .role-card:hover {
            background: rgba(91, 108, 246, 0.06);
            transform: translateX(6px);
        }

        /* Hexagon icon container */
        .role-hex-border {
            flex-shrink: 0;
            width: 58px;
            height: 67px;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            background: var(--role-color, var(--uchu-primary));
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .role-hex-inner {
            width: 49px;
            height: 57px;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            background: #111111;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .role-icon-img {
            width: 32px;
            height: 32px;
            object-fit: contain;
        }

        /* Role name + underline */
        .role-name-wrap {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding-bottom: 5px;
            position: relative;
        }

        /* 水平の下線 */
        .role-name-wrap::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: var(--role-color, var(--uchu-primary));
        }

        /* 六角形から下線へつながる斜め線 */
        .role-name-wrap::before {
            content: '';
            position: absolute;
            bottom: 0;
            right: 100%;
            width: 20px;
            height: 1px;
            background: var(--role-color, var(--uchu-primary));
            transform-origin: right bottom;
            transform: rotate(30deg);
        }

        .role-name {
            font-family: var(--font-heading);
            font-size: 1.2rem;
            font-weight: 1000;
            color: var(--uchu-text-primary);
            line-height: 1.3;
            white-space: nowrap;
            display: inline-block;
            transform-origin: left center;
        }

        /* Team badges (shown inside modal only) */
        .role-badges {
            display: flex;
            gap: var(--space-sm);
            margin-top: var(--space-md);
            flex-wrap: wrap;
        }

        .role-badge {
            display: inline-flex;
            align-items: center;
            gap: var(--space-xs);
            padding: 3px 10px;
            border-radius: 100px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            border: 1.5px solid;
        }

        .badge-crew     { background: rgba(140,255,255,0.12); color: #0891B2; border-color: rgba(8,145,178,0.35); }
        .badge-impostor { background: rgba(255,25,25,0.1);   color: #EF4444; border-color: rgba(239,68,68,0.35); }
        .badge-neutral  { background: rgba(243,162,0,0.1);   color: #D97706; border-color: rgba(217,119,6,0.35); }
        .badge-modifier { background: rgba(91,108,246,0.1);  color: #5B6CF6; border-color: rgba(91,108,246,0.35); }
        .badge-ghost    { background: rgba(107,114,128,0.1); color: #6B7280; border-color: rgba(107,114,128,0.35); }
        .badge-perk     { background: rgba(139,92,246,0.1);  color: #8B5CF6; border-color: rgba(139,92,246,0.35); }

        /* ------------------------------------------------
           Gallery
           ------------------------------------------------ */
        .gallery-section {
            margin-bottom: var(--space-xl);
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 6px;
        }

        .gallery-image {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
            border-radius: var(--radius-sm);
            border: 1px solid var(--uchu-border);
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
            display: block;
        }

        .gallery-image:hover {
            transform: scale(1.04);
            box-shadow: 0 4px 14px rgba(0,0,0,0.15);
        }

        /* ------------------------------------------------
           No Results
           ------------------------------------------------ */
        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: var(--space-2xl);
            background: #FFFFFF;
            border: 1px solid var(--uchu-border);
            border-radius: var(--radius-lg);
            color: var(--uchu-text-muted);
            box-shadow: var(--shadow-sm);
        }

        .no-results i {
            font-size: 2.5rem;
            margin-bottom: var(--space-lg);
            opacity: 0.4;
            color: var(--uchu-primary);
        }

        /* ------------------------------------------------
           Role Modal — White Panel
           ------------------------------------------------ */
        .role-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(13, 17, 23, 0.75);
            backdrop-filter: blur(4px);
            z-index: 9999;
            overflow-y: auto;
            padding: var(--space-xl);
        }

        .role-modal.active {
            display: block;
            animation: fadeIn 0.25s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        .modal-content {
            max-width: 860px;
            margin: var(--space-2xl) auto;
            background: #FFFFFF;
            border: 1px solid var(--uchu-border);
            border-radius: var(--radius-xl);
            padding: var(--space-2xl);
            position: relative;
            box-shadow: 0 24px 80px rgba(0,0,0,0.2);
            overflow-y: auto;
            overflow-x: hidden;
        }

        /* Custom scrollbar for modal */
        .modal-content::-webkit-scrollbar { width: 6px; }
        .modal-content::-webkit-scrollbar-track { background: var(--uchu-bg-mid); border-radius: 3px; }
        .modal-content::-webkit-scrollbar-thumb { background: var(--uchu-border); border-radius: 3px; }
        .modal-content::-webkit-scrollbar-thumb:hover { background: var(--uchu-primary); }

        /* 背景の役職立ち絵 */
        .modal-background-image {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 340px;
            height: 520px;
            background-size: contain;
            background-position: bottom right;
            background-repeat: no-repeat;
            opacity: 0.18;
            pointer-events: none;
            z-index: 0;
        }

        /* 右上の出典ロゴ */
        .modal-from-logo {
            position: absolute;
            top: var(--space-lg);
            right: var(--space-lg);
            max-width: 130px;
            max-height: 64px;
            object-fit: contain;
            opacity: 0.7;
            z-index: 3;
        }

        .modal-header {
            display: flex;
            gap: var(--space-xl);
            margin-bottom: var(--space-xl);
            align-items: flex-start;
        }

        .modal-icon {
            width: 100px;
            height: 100px;
            flex-shrink: 0;
            background: #111111;
            border: 1px solid var(--uchu-border);
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-icon img {
            max-width: 70%;
            max-height: 70%;
        }

        .modal-header-content {
            flex: 1;
        }

        .modal-title {
            font-family: var(--font-display);
            font-size: clamp(1.6rem, 3vw, 2.2rem);
            font-weight: 800;
            margin-bottom: var(--space-sm);
            /* color is set inline via JS (role color) */
        }

        .modal-intro {
            font-size: 1rem;
            color: var(--uchu-text-secondary);
            font-style: italic;
            margin-bottom: var(--space-md);
        }

        .modal-description {
            font-size: 0.975rem;
            color: var(--uchu-text-secondary);
            line-height: 1.85;
            margin-bottom: var(--space-xl);
        }

        .abilities-section {
            margin-bottom: var(--space-xl);
        }

        .section-title {
            font-family: var(--font-heading);
            font-size: 1.25rem;
            font-weight: 700;
            color: #6b7280;
            margin-bottom: var(--space-lg);
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .ability-item {
            background: rgba(244, 246, 250, 0.4);
            border: 1px solid rgba(226, 232, 240, 0.5);
            border-radius: var(--radius-md);
            padding: var(--space-lg);
            margin-bottom: var(--space-md);
            display: flex;
            gap: var(--space-lg);
            align-items: center;
        }

        .ability-button-container {
            flex-shrink: 0;
        }

        .ability-button {
            width: 80px;
            height: 80px;
            object-fit: contain;
            display: block;
        }

        .ability-content {
            flex: 1;
        }

        .ability-name {
            font-family: var(--font-heading);
            font-size: 0.975rem;
            font-weight: 700;
            color: var(--uchu-text-primary);
            margin-bottom: var(--space-sm);
        }

        .ability-description {
            color: var(--uchu-text-secondary);
            line-height: 1.65;
            font-size: 0.9rem;
        }

        /* ------------------------------------------------
           Secret Modal body
           ------------------------------------------------ */
        .secret-modal-body {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .secret-modal-thumbnail {
            flex-shrink: 0;
            display: flex;
            justify-content: center;
        }

        .secret-modal-text {
            flex: 1;
            text-align: center;
        }

        /* ------------------------------------------------
           Responsive
           ------------------------------------------------ */
        @media (max-width: 1024px) and (min-width: 769px) {
            .modal-icon { width: 86px; height: 86px; }
            .modal-from-logo { max-width: 110px; max-height: 54px; }
        }

        @media (max-width: 768px) {
            .roles-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 0;
            }

            .modal-content {
                padding: var(--space-xl) var(--space-lg);
                margin: 0;
                max-height: 100vh;
                border-radius: 0;
            }

            .modal-background-image {
                width: 100%;
                height: 320px;
                background-position: bottom center;
                bottom: 0; left: 0; right: 0;
            }

            .modal-header {
                flex-direction: column;
                gap: var(--space-md);
                margin-bottom: var(--space-lg);
            }

            .modal-icon { width: 72px; height: 72px; }

            .modal-from-logo {
                position: static;
                margin: 0 auto var(--space-md);
                max-width: 90px; max-height: 46px;
                display: block;
            }

            .modal-title  { font-size: 1.6rem; }
            .modal-intro  { font-size: 0.95rem; }

            .ability-item {
                flex-direction: column;
                gap: var(--space-md);
            }

            .secret-modal-body {
                flex-direction: column;
                align-items: center;
            }

            .secret-modal-thumbnail { margin-bottom: var(--space-lg); }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div id="header"></div>

    <!-- Hero Section -->
    <section class="uchu-section">
        <div class="uchu-section-header">
            <h1 class="uchu-section-title">
                <i class="fas fa-users"></i> ROLES
            </h1>
            <p class="uchu-section-subtitle">
                クルーメイト、インポスター、ニュートラルなど全役職を網羅
            </p>
        </div>

        <!-- Search and Filters -->
        <div class="search-filter-section">
            <div class="search-box">
                <i class="fas fa-search search-icon"></i>
                <input type="text" class="search-input" id="searchInput" placeholder="役職名で検索...">
            </div>

            <div class="filter-section">
                <div class="filter-label">
                    <i class="fas fa-users"></i> 陣営フィルター
                </div>
                <div class="filter-buttons">
                    <button class="filter-btn team-btn active" data-team="all">すべて</button>
                    <button class="filter-btn team-btn" data-team="クルーメイト">クルーメイト</button>
                    <button class="filter-btn team-btn" data-team="インポスター">インポスター</button>
                    <button class="filter-btn team-btn" data-team="ニュートラル">ニュートラル</button>
                    <button class="filter-btn team-btn" data-team="モディファイア">モディファイア</button>
                    <button class="filter-btn team-btn" data-team="ゴースト">ゴースト</button>
                    <button class="filter-btn team-btn" data-team="パーク">パーク</button>
                </div>
            </div>

            <div class="filter-section">
                <div class="filter-label">
                    <i class="fas fa-book"></i> 出典元フィルター
                </div>
                <div class="filter-buttons" id="fromContainer">
                    <!-- 出典フィルターはJSで生成 -->
                </div>
            </div>
        </div>

        <!-- Roles Grid -->
        <div class="roles-grid" id="rolesContainer">
            <!-- 役職カードはJavaScriptで動的に生成 -->
        </div>

        <div class="no-results" id="noResults" style="display: none;">
            <i class="fas fa-search-minus"></i>
            <p>該当する役職が見つかりませんでした</p>
        </div>
    </section>

    <!-- Role Modal -->
    <div class="role-modal" id="roleModal">
        <div class="modal-content" id="modalContent">
            <!-- モーダル内容はJavaScriptで動的に生成 -->
        </div>
    </div>

    <!-- Footer -->
    <div id="footer"></div>

    <script src="roleMain.js"></script>
    <script>
        // ---- Role card entrance animation (top → bottom, in DOM order) ----
        let animTimer = null;

        function animateRoleCards() {
            // 前回のタイマーをリセット
            if (animTimer !== null) {
                clearTimeout(animTimer);
                animTimer = null;
            }
            const cards = document.querySelectorAll('.role-card');
            cards.forEach((card, i) => {
                card.classList.remove('card-visible');
                card.style.transitionDelay = '0ms';
                // DOM順に 30ms ずつずらして表示
                setTimeout(() => {
                    card.classList.add('card-visible');
                }, i * 30);
            });
        }

        new MutationObserver(() => {
            animateRoleCards();
        }).observe(
            document.getElementById('rolesContainer'),
            { childList: true }
        );
    </script>
    <script>
        // Load header and footer
        fetch('../components/header.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('header').innerHTML = data;
            });

        fetch('../components/footer.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('footer').innerHTML = data;
            });

        // Override showRoleDetails to use new modal
        function showRoleDetails(role) {
            const modal = document.getElementById('roleModal');
            const content = document.getElementById('modalContent');

            // ★シークレット役職の判定を追加
            const isSecret = role._isSecret === true ||
                             role.team === 'SECRET' ||
                             role.team === 'シークレット' ||
                             (role.search_keywords && Array.isArray(role.search_keywords) && role.search_keywords.length > 0);

            console.log('📋 showRoleDetails called:', role.name, 'isSecret:', isSecret);

            if (isSecret) {
                showSecretModal(role);
                return;
            }

            const roleColor = role.color ? `rgb(${role.color})` : 'rgb(74, 144, 226)';

            // 背景画像（役職立ち絵）
            const characterPath = role.english_name ? `../resource/roleimage/${role.english_name}.png` : '';

            // 出典ロゴ
            const fromLogoPath = role.from ? `../resource/from/${role.from}.png` : '';

            let galleryHTML = '';
            if (role.gallery && role.gallery.length > 0) {
                const galleryImages = role.gallery.map(img => `
                    <img src="../resource/rolepicture/${img}"
                         alt="使用イメージ"
                         class="gallery-image"
                         onerror="this.style.display='none'">
                `).join('');
                galleryHTML = `
                    <div class="gallery-section">
                        <h3 class="section-title">
                            <i class="fas fa-images"></i> 使用イメージ画像
                        </h3>
                        <div class="gallery-grid">
                            ${galleryImages}
                        </div>
                    </div>
                `;
            }

            let abilitiesHTML = '';
            if (role.abilities && role.abilities.length > 0) {
                const abilitiesItems = role.abilities.map(ability => `
                    <div class="ability-item">
                        <div class="ability-button-container">
                            <img src="../resource/rolebutton/${ability.button}"
                                 alt="${ability.name}"
                                 class="ability-button"
                                 onerror="this.src='../resource/roleimage/NoImage.png'">
                        </div>
                        <div class="ability-content">
                            <div class="ability-name">${ability.name}</div>
                            <div class="ability-description">${ability.description}</div>
                        </div>
                    </div>
                `).join('');

                // abilities_title があれば「固有能力 〇〇」、なければ「固有能力」
                const abilitiesSectionTitle = role.abilities_title
                    ? `固有能力 ${role.abilities_title}`
                    : '固有能力';

                abilitiesHTML = `
                    <div class="abilities-section">
                        <h3 class="section-title">
                            <i class="fas fa-bolt"></i> ${abilitiesSectionTitle}
                        </h3>
                        ${abilitiesItems}
                    </div>
                `;
            }

            const teamClass = role.team === 'クルーメイト' ? 'crew' :
                             role.team === 'インポスター' ? 'impostor' :
                             role.team === 'ニュートラル' ? 'neutral' :
                             role.team === 'モディファイア' ? 'modifier' :
                             role.team === 'パーク' ? 'perk' : 'ghost';

            content.innerHTML = `
                ${characterPath ? `<div class="modal-background-image" style="background-image: url('${characterPath}');"></div>` : ''}
                ${fromLogoPath ? `<img src="${fromLogoPath}" alt="出典" class="modal-from-logo" onerror="this.style.display='none'">` : ''}

                <div class="modal-header" style="position: relative; z-index: 2;">
                    <div class="modal-icon">
                        <img id="modal-detail-icon" src="" alt="${role.name}" style="display:none;">
                    </div>
                    <div class="modal-header-content">
                        <h2 class="modal-title" style="color: #374151;">
                            ${role.name}${role.english_name ? `<span style="font-size: 0.45em; color: var(--uchu-text-muted); font-weight: 400; margin-left: 0.4em;">/ ${role.english_name}</span>` : ''}
                        </h2>
                        ${role.intro ? `<div class="modal-intro">${role.intro}</div>` : ''}
                        <div class="role-badges">
                            <span class="role-badge badge-${teamClass}">${role.team}</span>
                            ${role.from ? `<span class="role-badge" style="background: rgba(74, 144, 226, 0.2); color: var(--uchu-accent); border-color: var(--uchu-accent);">${role.from}</span>` : ''}
                        </div>
                    </div>
                </div>

                <div class="modal-description" style="position: relative; z-index: 2;">${role.description}</div>

                <div style="position: relative; z-index: 2;">
                    ${abilitiesHTML}

                    ${role.tips ? `
                        <div class="abilities-section">
                            <h3 class="section-title">
                                <i class="fas fa-lightbulb"></i> 豆知識
                            </h3>
                            <div style="color: var(--uchu-text-secondary); line-height: 1.8; font-size: 1rem;">
                                ${role.tips}
                            </div>
                        </div>
                    ` : ''}

                    ${galleryHTML}
                </div>

                <div style="text-align: center; margin-top: var(--space-2xl); position: relative; z-index: 2;">
                    <button class="uchu-btn uchu-btn-primary" onclick="closeModal()">
                        <i class="fas fa-times"></i> 閉じる
                    </button>
                </div>
            `;

            // モーダル内アイコンも roleMain.js の解決ロジックを利用
            const modalIconElement = document.getElementById('modal-detail-icon');
            if (typeof applyRoleIcon === 'function') {
                applyRoleIcon(modalIconElement, role);
            } else if (typeof recolorIcon === 'function') {
                recolorIcon('../resource/roleicon/Crewmate.png', role.color, (recoloredDataURL) => {
                    if (recoloredDataURL) {
                        modalIconElement.src = recoloredDataURL;
                        modalIconElement.style.display = 'block';
                    }
                });
            }

            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        // ★シークレット役職用モーダル表示関数を追加
        function showSecretModal(role) {
            console.log('🔐 showSecretModal が呼ばれました:', role);

            const modal = document.getElementById('roleModal');
            const content = document.getElementById('modalContent');

            const roleColor = role.color ? `rgb(${role.color})` : 'rgb(138, 43, 226)';
            const iconPath = getRoleIconPath(role);
            const thumbnailPath = role.thumbnail ? `../resource/rolepicture/${role.thumbnail}` : '';

            // ボタンHTML生成
            let buttonHTML = '';
            if (role.button && role.button.url) {
                buttonHTML = `
                    <div style="margin-top: 1.5rem;">
                        <a href="${role.button.url}"
                           target="_blank"
                           class="uchu-btn uchu-btn-primary"
                           style="display: inline-flex; align-items: center; gap: 0.5rem; text-decoration: none;">
                            <i class="fas fa-external-link-alt"></i> ${role.button.text || 'リンクを開く'}
                        </a>
                    </div>
                `;
            }

            content.innerHTML = `
                <div style="padding: 1rem;">
                    <!-- ヘッダー部分 -->
                    <div class="modal-header" style="position: relative; z-index: 2; margin-bottom: var(--space-xl); align-items: center;">
                        <div class="modal-icon">
                            <img id="secret-modal-icon" src="" alt="Secret" style="display:none;">
                        </div>
                        <div class="modal-header-content">
                            <h2 class="modal-title" style="color: #374151; margin: 0;">
                                ${role.name}
                            </h2>
                        </div>
                    </div>

                    <!-- コンテンツ部分：サムネイルと説明+ボタン -->
                    <div class="secret-modal-body" style="position: relative; z-index: 2;">
                        ${thumbnailPath ? `
                            <div class="secret-modal-thumbnail">
                                <img src="${thumbnailPath}"
                                     alt="${role.name}"
                                     style="width: 100%; max-width: 280px; height: auto; object-fit: contain; border-radius: var(--radius-lg); display: block;"
                                     onerror="this.parentElement.style.display='none'">
                            </div>
                        ` : ''}

                        <div class="secret-modal-text">
                            <!-- 説明文 -->
                            <p style="color: var(--uchu-text-secondary); font-size: 1.1rem; line-height: 1.8; white-space: pre-line; margin: 0 0 1.5rem 0;">
                                ${role.description}
                            </p>

                            ${buttonHTML}
                        </div>
                    </div>
                </div>

                <!-- 閉じるボタン -->
                <div style="text-align: center; margin-top: var(--space-2xl); padding-top: var(--space-xl); border-top: 1px solid var(--uchu-border); position: relative; z-index: 2;">
                    <button class="uchu-btn uchu-btn-primary" onclick="closeModal()">
                        <i class="fas fa-times"></i> 閉じる
                    </button>
                </div>
            `;

            // アイコンをiconフィールドから色変換して表示
            const secretIconElement = document.getElementById('secret-modal-icon');
            if (iconPath) {
                applyRoleIcon(secretIconElement, role);
            }

            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('roleModal').classList.remove('active');
            document.body.style.overflow = '';
        }

        // Close modal on outside click
        document.getElementById('roleModal').addEventListener('click', (e) => {
            if (e.target.id === 'roleModal') {
                closeModal();
            }
        });

        // Close modal on ESC key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeModal();
            }
        });
    </script>
</body>
</html>
