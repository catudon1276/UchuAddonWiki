<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="meta.site_title_gallery">Uchu Addon Wiki ギャラリー</title>
    <meta property="og:title" content="Uchu Addon Wiki - ギャラリー">
    <meta property="og:description" content="Uchu Addon のボタンやイラスト素材を閲覧できます。">
    <meta property="og:image" content="https://catudon1276.github.io/UchuAddonWiki/components/CoverIllust.png">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://catudon1276.github.io/UchuAddonWiki/gallery/">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Uchu Addon Wiki - ギャラリー">
    <meta name="twitter:description" content="Uchu Addon のボタンやイラスト素材を閲覧できます。">
    <meta name="twitter:image" content="https://catudon1276.github.io/UchuAddonWiki/components/CoverIllust.png">
    <link rel="icon" type="image/png" href="../resource/UchuLogo.png">
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../components/styles-common.css">
    <script src="../components/theme.js"></script>
    <script src="../components/i18n.js"></script>
    <style>
        .hero-section {
            max-width: 1200px;
            margin: 0 auto;
            padding: 4rem 2rem 2rem;
            text-align: center;
        }

        .hero-title {
            font-size: 3rem;
            margin-bottom: 0.5rem;
            color: var(--uchu-text-primary);
            font-weight: 800;
        }

        /* 利用規約セクション — シンプルデザイン */
        .terms-section {
            max-width: 800px;
            margin: 3rem auto 0;
            padding: 2.5rem 2rem;
            text-align: left;
            position: relative;
        }

        .terms-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 2px;
        }

        .terms-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--uchu-text-primary);
            margin-bottom: 1.25rem;
            text-align: center;
            letter-spacing: 0.05em;
        }

        .terms-content {
            color: var(--uchu-text-secondary);
            line-height: 1.8;
        }

        .terms-intro {
            font-size: 0.95rem;
            margin-bottom: 2rem;
            text-align: center;
            color: var(--uchu-text-secondary);
        }

        .terms-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-bottom: 1.5rem;
        }

        .terms-col h4 {
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .terms-col.allowed h4 {
            color: #16a34a;
        }

        .terms-col.prohibited h4 {
            color: #dc2626;
        }

        .terms-col ul {
            margin: 0;
            padding-left: 1.25rem;
        }

        .terms-col li {
            margin-bottom: 0.4rem;
            color: var(--uchu-text-secondary);
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .terms-note {
            margin-top: 1.5rem;
            padding: 0.75rem 1rem;
            font-size: 0.85rem;
            color: var(--uchu-text-secondary);
            text-align: center;
        }

        .terms-footer {
            text-align: center;
            font-size: 0.8rem;
            color: var(--uchu-text-muted);
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--uchu-border);
        }

        .filter-section {
            padding: 1.5rem 2rem;
            margin: 2rem auto;
            max-width: 1200px;
        }

        .category-buttons {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .category-btn {
            padding: 0.75rem 1.5rem;
            background: var(--uchu-bg-mid);
            border: 2px solid var(--uchu-border);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            color: var(--uchu-text-secondary);
            font-size: 1rem;
        }

        .category-btn:hover {
            background: rgba(91, 108, 246, 0.08);
            border-color: var(--uchu-primary);
            color: var(--uchu-primary);
            transform: translateY(-2px);
        }

        .category-btn.active {
            background: var(--uchu-text-primary);
            color: var(--uchu-bg-light);
            border-color: var(--uchu-text-primary);
        }

        .gallery-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .category-section {
            margin-bottom: 3rem;
        }

        .category-title {
            font-size: 1.8rem;
            font-weight: bold;
            margin-bottom: 1.5rem;
            color: var(--uchu-text-primary);
            border-bottom: 2px solid var(--uchu-border);
            padding-bottom: 0.5rem;
        }

        .gallery-grid {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding: 1rem 0;
        }

        .gallery-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            width: 100%;
        }

        /* タイトルカテゴリは中央揃え・1行 */
        .gallery-grid.center-grid {
            justify-content: center;
            flex-direction: row;
        }

        /* 役職立ち絵：パラメーター調整可能 */
        .gallery-grid.role-image-grid {
            --item-size: 300px;   /* 画像サイズ */
            --item-margin: -40px; /* 負のマージン（値を小さくするほど重なる） */

            display: flex;
            flex-direction: column;
            align-items: center;
            gap: calc(var(--item-margin) * -1); /* 行間の隙間をマージンと合わせる */
            padding: 2rem 0;
        }

        .gallery-grid.role-image-grid .gallery-row {
            display: flex;
            justify-content: center;
            width: 100%;
            flex-wrap: nowrap; /* 行内で折り返さない */
        }

        .gallery-grid.role-image-grid .gallery-item {
            margin: var(--item-margin); /* 負のマージンで重ねる */
            transition: transform 0.2s ease, z-index 0s, filter 0.2s ease;
        }

        .gallery-grid.role-image-grid .gallery-item.item-visible:hover {
            transform: scale(1.15) rotate(0deg) !important;
            z-index: 100;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.4));
        }

        .gallery-grid.role-image-grid .gallery-image {
            height: var(--item-size);
            width: var(--item-size);
            object-fit: contain;
        }

        .gallery-grid.center-grid .gallery-row {
            justify-content: center;
        }

        .gallery-grid.center-grid .gallery-image {
            height: 180px;
            width: 180px;
        }

        .gallery-item {
            flex: none;
            cursor: pointer;
            opacity: 0;
            transform: translateY(14px) scale(0.96);
            transition: transform 0.28s cubic-bezier(0.34, 1.56, 0.64, 1),
                        filter 0.25s ease,
                        opacity 0.28s ease,
                        z-index 0s;
        }

        .gallery-item.item-visible {
            opacity: 1;
            transform: var(--item-base-transform, none);
        }

        .gallery-item.item-visible:hover {
            transform: scale(1.15) rotate(0deg) !important;
            filter: drop-shadow(0 8px 28px rgba(91, 108, 246, 0.3));
            z-index: 10;
            position: relative;
        }

        .gallery-image {
            height: 100px;
            width: 100px;
            display: block;
            object-fit: contain;
        }

        .gallery-filename {
            display: none;
        }

        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-bottom: 2rem;
            padding: 1rem;
            background: var(--uchu-bg-light);
            border-radius: 12px;
            border: 1px solid var(--uchu-border);
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: var(--uchu-primary);
        }

        .stat-label {
            font-size: 0.9rem;
            color: var(--uchu-text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--uchu-text-muted);
        }

        .empty-state i {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.3;
        }

        /* オーバーレイモーダル */
        .image-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 9999;
            align-items: center;
            justify-content: center;
        }

        .image-modal.active {
            display: flex;
        }

        .modal-content {
            position: relative;
            max-width: 90%;
            max-height: 90%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .modal-image {
            max-width: 100%;
            max-height: 80vh;
            object-fit: contain;
            border-radius: 12px;
        }

        .modal-controls {
            display: flex;
            gap: 1rem;
            margin-top: 3rem;
        }

        .modal-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.75rem;
            background: #ffffff;
            color: #0f172a;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: opacity 0.2s ease, transform 0.2s ease;
        }

        .modal-btn:hover {
            opacity: 0.85;
            transform: translateY(-1px);
        }

        .modal-btn.close-btn {
            background: rgba(255, 255, 255, 0.15);
            color: #ffffff;
        }

        .modal-btn.close-btn:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        /* プロモーションアート：横A4想定・3列表示 */
        .gallery-grid.promotionart-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            width: 100%;
        }

        .gallery-grid.promotionart-grid .gallery-item {
            width: 100%;
            margin: 0;
        }

        .gallery-grid.promotionart-grid .gallery-item.item-visible:hover {
            transform: scale(1.03) !important;
            filter: drop-shadow(0 4px 12px rgba(0,0,0,0.3));
        }

        .gallery-grid.promotionart-grid .gallery-image {
            width: 100%;
            height: auto;
            aspect-ratio: 297 / 210;
            object-fit: cover;
            border-radius: 8px;
        }

        @media (max-width: 768px) {
            .hero-title { font-size: 2rem; }
            .terms-section { padding: 2rem 1rem; margin: 2rem 1rem 0; }
            .terms-grid { grid-template-columns: 1fr; gap: 1.5rem; }
            .gallery-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 1rem; }
            .stats-bar { flex-direction: column; gap: 1rem; }
            .gallery-grid.promotionart-grid { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 480px) {
            .gallery-grid.promotionart-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div id="header"></div>

    <div class="hero-section">
        <h1 class="hero-title"><i class="fas fa-images" style="margin-right:0.5rem;"></i><span data-i18n="gallery.section_title">GALLERY</span></h1>

        <div class="terms-section">
            <h3 class="terms-title"><i class="fas fa-file-contract" style="margin-right:0.5rem;"></i><span data-i18n="gallery.terms_title">ご利用規約</span></h3>
            <div class="terms-content">
                <p class="terms-intro" data-i18n="gallery.terms_intro">本アドオンで登場するボタンやイラストです。配信や動画でお使いいただけます。</p>

                <div class="terms-grid">
                    <div class="terms-col allowed">
                        <h4><i class="fas fa-check-circle"></i> <span data-i18n="gallery.terms_allowed">OK</span></h4>
                        <ul>
                            <li data-i18n="gallery.terms_allowed_1">動画や配信内での画像素材</li>
                            <li data-i18n="gallery.terms_allowed_2">SNSのアイコン、ヘッダー、カバー用の画像素材</li>
                        </ul>
                    </div>

                    <div class="terms-col prohibited">
                        <h4><i class="fas fa-times-circle"></i> <span data-i18n="gallery.terms_prohibited">NG</span></h4>
                        <ul>
                            <li data-i18n="gallery.terms_prohibited_1">イラストの作者を偽る発言（自作発言）</li>
                            <li data-i18n="gallery.terms_prohibited_2">イラストの無断転載</li>
                            <li data-i18n="gallery.terms_prohibited_3">その他、関係する方々に迷惑のかかるご利用</li>
                        </ul>
                    </div>
                </div>

                <p class="terms-note"><i class="fas fa-info-circle" style="margin-right:6px;"></i><span data-i18n="gallery.terms_note">色調の変更は問題ありません</span></p>

                <p class="terms-footer" data-i18n="gallery.terms_footer">以上の点をご理解いただいたうえでご利用ください。</p>
            </div>
        </div>
    </div>

    <div class="filter-section">
        <div class="category-buttons" id="categoryButtons">
            <button class="category-btn active" data-category="all" data-i18n="gallery.filter_all">すべて</button>
        </div>
    </div>

    <div class="gallery-container">
        <div id="galleryContent"></div>
    </div>

    <div id="footer"></div>

    <div id="imageModal" class="image-modal">
        <div class="modal-content">
            <img id="modalImage" class="modal-image" src="" alt="">
            <div class="modal-controls">
                <button id="modalDownloadBtn" class="modal-btn"><i class="fas fa-download"></i><span data-i18n="gallery.modal_download">ダウンロード</span></button>
                <button id="modalCloseBtn" class="modal-btn close-btn"><i class="fas fa-times"></i><span data-i18n="gallery.modal_close">閉じる</span></button>
            </div>
        </div>
    </div>

    <script>
        let galleryData = {}, currentFilter = 'all';

        // i18n ヘルパー
        function __currentLang() {
            try { return localStorage.getItem('uchuLang') === 'en' ? 'en' : 'ja'; } catch(e) { return 'ja'; }
        }
        function __pickLocalized(v) {
            if (v && typeof v === 'object' && ('ja' in v || 'en' in v)) {
                const lang = __currentLang();
                return v[lang] != null ? v[lang] : (v.ja != null ? v.ja : v.en);
            }
            return v;
        }

        fetch('../components/header.html').then(r => r.text()).then(d => document.getElementById('header').innerHTML = d);
        fetch('../components/footer.html').then(r => r.text()).then(d => document.getElementById('footer').innerHTML = d);

        fetch('./gallery.json').then(r => r.json()).then(data => {
            galleryData = data;

            // 「すべて」ボタンにイベントを追加
            const allBtn = document.querySelector('.category-btn[data-category="all"]');
            if (allBtn) {
                allBtn.onclick = () => {
                    currentFilter = 'all';
                    document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                    allBtn.classList.add('active');
                    renderGallery();
                };
            }

            // カテゴリボタンを動的生成
            Object.keys(galleryData).forEach(id => {
                if (id.startsWith('_')) return;
                const btn = document.createElement('button');
                btn.className = 'category-btn';
                btn.dataset.category = id;
                btn.dataset.nameRaw = JSON.stringify(galleryData[id].name);
                btn.textContent = __pickLocalized(galleryData[id].name);
                btn.onclick = () => {
                    currentFilter = id;
                    document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    renderGallery();
                };
                document.getElementById('categoryButtons').appendChild(btn);
            });
            renderGallery();
        }).catch(() => {
            const errMsg = (window.UchuI18n && window.UchuI18n.t('gallery.load_error')) || '読み込みエラー';
            document.getElementById('galleryContent').innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>' + errMsg + '</p></div>';
        });

        // 言語切替時にカテゴリボタン/見出しを再描画
        document.addEventListener('click', function(e){
            if (e.target.closest && e.target.closest('.lang-switch-btn')) {
                setTimeout(function(){
                    document.querySelectorAll('.category-btn[data-name-raw]').forEach(function(btn){
                        try {
                            const raw = JSON.parse(btn.dataset.nameRaw);
                            btn.textContent = __pickLocalized(raw);
                        } catch(e) {}
                    });
                    if (Object.keys(galleryData).length > 0) renderGallery();
                }, 0);
            }
        });

        function renderGallery() {
            const c = document.getElementById('galleryContent');
            c.innerHTML = '';
            Object.keys(galleryData).forEach(id => {
                if (id.startsWith('_')) return;
                if (currentFilter !== 'all' && currentFilter !== id) return;
                const cat = galleryData[id];
                if (!cat.images || cat.images.length === 0) return;
                const sec = document.createElement('div');
                sec.className = 'category-section';
                sec.innerHTML = `<h2 class="category-title">${__pickLocalized(cat.name)}</h2>`;
                const grid = document.createElement('div');
                grid.className = 'gallery-grid';

                // カテゴリに応じたスタイル適用
                if (id === 'logo') {
                    grid.classList.add('center-grid');
                } else if (id === 'roleimage') {
                    grid.classList.add('role-image-grid');
                } else if (id === 'promotionart') {
                    grid.classList.add('promotionart-grid');
                }

                if (id === 'promotionart') {
                    const uniqueImages = [...new Set(cat.images)];
                    uniqueImages.forEach(img => {
                        const path = `../resource/${id}/${img}`;
                        const item = document.createElement('div');
                        item.className = 'gallery-item';
                        item.onclick = () => openModal(path, img);
                        item.innerHTML = `<img src="${path}" alt="${img}" class="gallery-image">`;
                        grid.appendChild(item);
                    });
                } else if (id !== 'logo') {
                    // 重複を除去
                    const uniqueImages = [...new Set(cat.images)];

                    if (id === 'roleimage') {
                        // 役職立ち絵：JSONの順序のまま表示
                        const displayImages = uniqueImages;

                        // 1行に入る個数を計算（初回のみ）
                        const w = window.innerWidth || document.documentElement.clientWidth;
                        // 300pxサイズ + マージン-40px*2 = 実質幅220px
                        // 画面幅に合わせて計算するが、最大5個までとする
                        let itemsPerRow = Math.max(1, Math.floor(w / 220));
                        if (itemsPerRow > 5) itemsPerRow = 5;

                        const renderRows = () => {
                            grid.innerHTML = '';
                            let currentIndex = 0;

                            while (currentIndex < displayImages.length) {
                                const row = document.createElement('div');
                                row.className = 'gallery-row';

                                const rowItems = displayImages.slice(currentIndex, currentIndex + itemsPerRow);
                                rowItems.forEach(img => {
                                    const path = `../resource/${id}/${img}`;
                                    const item = document.createElement('div');
                                    item.className = 'gallery-item';
                                    item.onclick = () => openModal(path, img);
                                    item.innerHTML = `<img src="${path}" alt="${img}" class="gallery-image">`;
                                    row.appendChild(item);
                                });
                                grid.appendChild(row);
                                currentIndex += itemsPerRow;
                            }
                        };

                        renderRows();
                        // リサイズ時の再描画を削除し、配置を固定する
                    } else {
                        // 能力ボタンなど：すべての行で均等な数にする
                        const getWidth = () => window.innerWidth || document.documentElement.clientWidth;
                        const getItemsPerRow = () => {
                            const w = getWidth();
                            // 100pxサイズ + ギャップ考慮
                            if (w >= 1200) return 9;
                            if (w >= 768) return 7;
                            if (w >= 480) return 5;
                            return 3;
                        };

                        const renderRows = () => {
                            grid.innerHTML = '';
                            const itemsPerRow = getItemsPerRow(); // 固定値を使用
                            let currentIndex = 0;

                            while (currentIndex < uniqueImages.length) {
                                const row = document.createElement('div');
                                row.className = 'gallery-row';
                                const rowItems = uniqueImages.slice(currentIndex, currentIndex + itemsPerRow);
                                rowItems.forEach(img => {
                                    const path = `../resource/${id}/${img}`;
                                    const item = document.createElement('div');
                                    item.className = 'gallery-item';
                                    item.onclick = () => openModal(path, img);
                                    item.innerHTML = `<img src="${path}" alt="${img}" class="gallery-image">`;
                                    row.appendChild(item);
                                });
                                grid.appendChild(row);
                                currentIndex += itemsPerRow;
                            }
                        };

                        renderRows();
                        window.addEventListener('resize', () => { renderRows(); animateGalleryItems(); });
                    }
                } else {
                    // タイトルカテゴリは1行にまとめて中央配置
                    const row = document.createElement('div');
                    row.className = 'gallery-row';
                    cat.images.forEach(img => {
                        const path = `../resource/${img}`;
                        const item = document.createElement('div');
                        item.className = 'gallery-item';
                        item.onclick = () => openModal(path, img);
                        item.innerHTML = `<img src="${path}" alt="${img}" class="gallery-image">`;
                        row.appendChild(item);
                    });
                    grid.appendChild(row);
                }
                sec.appendChild(grid);
                c.appendChild(sec);
            });
        }

        // ---- Gallery item entrance animation (top → bottom, in DOM order) ----
        function animateGalleryItems() {
            const items = document.querySelectorAll('.gallery-item');
            items.forEach((item, i) => {
                item.classList.remove('item-visible');
                setTimeout(() => {
                    item.classList.add('item-visible');
                }, i * 25);
            });
        }

        new MutationObserver((mutations) => {
            // childList の追加のみ反応（subtree の細かい変化は無視）
            const added = mutations.some(m => m.addedNodes.length > 0);
            if (added) animateGalleryItems();
        }).observe(
            document.getElementById('galleryContent'),
            { childList: true, subtree: false }
        );

        function openModal(path, name) {
            document.getElementById('modalImage').src = path;
            document.getElementById('imageModal').classList.add('active');
            document.body.style.overflow = 'hidden';
            document.getElementById('modalDownloadBtn').onclick = () => { const a = document.createElement('a'); a.href = path; a.download = name; a.click(); };
        }

        function closeModal() { document.getElementById('imageModal').classList.remove('active'); document.body.style.overflow = ''; }
        document.getElementById('modalCloseBtn').onclick = closeModal;
        document.getElementById('imageModal').onclick = e => { if (e.target.id === 'imageModal') closeModal(); };
        document.onkeydown = e => { if (e.key === 'Escape') closeModal(); };
    </script>
</body>
</html>
