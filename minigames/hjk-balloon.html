<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Hjk Balloon</title>
<link rel="icon" type="image/png" href="/UchuAddonWiki/resource/UchuLogo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { width: 100%; height: 100%; overflow: hidden; touch-action: none; background: #000; }
body { display: flex; align-items: center; justify-content: center; }
canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// ── Sizing ──
const BW = 360, BH = 640;
const FRAME_T = 8; // frame border thickness
let W, H, S;
function resize() {
  const ar = BW / BH;
  let w = window.innerWidth, h = window.innerHeight;
  if (w / h > ar) { H = h; W = h * ar; } else { W = w; H = w / ar; }
  canvas.width = W; canvas.height = H;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  S = W / BW;
}
resize();
window.addEventListener('resize', resize);

// ── Sprite sheet ──
const spriteImg = new Image();
spriteImg.src = '../resource/minigame/HjkBalloon.png';
let spriteLoaded = false;
spriteImg.onload = () => { spriteLoaded = true; };

let birds = [];
let birdTimer = 0;

const birdImg = new Image();
birdImg.src = '../resource/minigame/Bird.png';

// ── State ──
const ST = { TITLE: 0, PLAY: 1, OVER: 2, PAUSE: 3 };
let state = ST.TITLE;
let score = 0, hiScore = 0;
let height = 0, hiHeight = 0;  // 高度
let nightBtnX = BW + 80;       // ナイトモードボタンX（アニメーション用）
let balloon, platforms, coins, powerups;
let scrollSpeed, baseSpeed, spawnTimer, coinTimer, powerTimer, elapsed;
let magnetActive = false, magnetTimer = 0;
let shieldActive = false, shieldTimer = 0;
let invincible = false, invTimer = 0;
let invertAmount = 0;
let nightFlash = 0; // ナイトモード終了時の点滅
let touchPos = null, touchOrigin = null, touchBalloonOrigin = null;
let scorePopups = []; // { x, y, text, timer }
let invStock = 0;    // 無敵ストック（最大1）
let heartStock = 0;  // ハートストック（最大3）



// ── Keyboard (WASD + arrows) ──
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.key.toLowerCase()] = true;
  if (state === ST.TITLE) { init(); state = ST.PLAY; }
  if (state === ST.OVER && (e.key === ' ' || e.key === 'Enter')) { init(); state = ST.PLAY; }
  if (e.key.toLowerCase() === 'q') useInvincible();
  if (e.key === 'Escape' || e.key.toLowerCase() === 'p') {
    if (state === ST.PLAY) state = ST.PAUSE;
    else if (state === ST.PAUSE) state = ST.PLAY;
  }
});
window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

// ── Balloon ──
function mkBalloon() {
  return { x: BW / 2, y: BH * 0.6, w: 48, h: 72, vx: 0, vy: 0 };
}

// ── Platform (checkered obstacle from sides) ──
function mkPlatform() {
  const fromRight = Math.random() < 0.5;
  // X(80000)以降は最大幅が縮小、最小幅はBW/3(=120)で固定
  const minW = 120;
  const maxW = score >= 80000 ? Math.max(120, 220 - (score - 80000) / 800) : 220;
  const w = minW + Math.random() * (maxW - minW);
  const x = fromRight ? BW - FRAME_T - w : FRAME_T;
  return { x, y: -20, w, h: 16 };
}

// ── Coin (rain-like) ──
function mkCoin(ox, oy) {
  return {
    x: ox != null ? ox : 20 + Math.random() * (BW - 40),
    y: oy != null ? oy : -14 - Math.random() * 80,
    r: 9, alive: true,
    vy: 0.4 + Math.random() * 0.6 // individual fall speed
  };
}

// ── Powerup ──
function mkPowerup() {
  // SS(30000)から回復アイテム出現、X(80000)からより頻繁に
  let types;
  if (score >= 80000)      types = ['magnet', 'magnet', 'invincible', 'invincible', 'heart', 'heart'];
  else if (score >= 30000) types = ['magnet', 'invincible', 'heart'];
  else                     types = ['magnet', 'invincible'];
  const type = types[Math.floor(Math.random() * types.length)];
  return { type, x: 30 + Math.random() * (BW - 60), y: -30 - Math.random() * 60, r: 14, alive: true };
}

// ── 死亡処理（ハートで救済） ──
function triggerDeath() {
  if (heartStock > 0) {
    heartStock--;
    invincible = true; invTimer = 3;
    scorePopups.push({ x: balloon.x, y: balloon.y - 20, text: '\u2665 SAVED!', timer: 1.2 });
  } else {
    state = ST.OVER;
    if (score > hiScore) hiScore = score;
    if (height > hiHeight) hiHeight = height;
  }
}

// ── 無敵ストック使用 ──
function useInvincible() {
  if (invStock > 0 && !invincible && state === ST.PLAY) {
    invStock--;
    invincible = true; invTimer = 6;
  }
}

// ── Init ──
function init() {
  score = 0; elapsed = 0;
  baseSpeed = 2; scrollSpeed = baseSpeed;
  spawnTimer = 0; coinTimer = 0; powerTimer = 0;
  magnetActive = false; magnetTimer = 0;
  shieldActive = false; shieldTimer = 0;
  invincible = false; invTimer = 0; invertAmount = 0;
  invStock = 0; heartStock = 0;
  height = 0; nightBtnX = BW + 80; nightFlash = 0;
  balloon = mkBalloon();
  platforms = []; coins = []; powerups = [];
  birds = []; birdTimer = 0; scorePopups = [];
}

// ── Input (touch/mouse) ──
function getX(e) {
  const rect = canvas.getBoundingClientRect();
  const cx = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
  return cx / (rect.width / BW);
}
function getY(e) {
  const rect = canvas.getBoundingClientRect();
  const cy = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
  return cy / (rect.height / BH);
}
function ptrDown(e) {
  e.preventDefault();
  if (state === ST.TITLE || state === ST.OVER) { init(); state = ST.PLAY; return; }
  if (state === ST.PLAY) {
    const rect = canvas.getBoundingClientRect();
    const px = ((e.touches ? e.touches[0].clientX : e.clientX) - rect.left) / (rect.width / BW);
    const py = ((e.touches ? e.touches[0].clientY : e.clientY) - rect.top) / (rect.height / BH);
    if (px > BW - 60 && py < 60) { state = ST.PAUSE; return; }
    // ナイトモードボタンタップ（右端=nightBtnX、52×52）
    const nbLeft = nightBtnX - 52, nbTop = BH - FRAME_T - 52;
    if (px > nbLeft && px < nightBtnX && py > nbTop && py < BH - FRAME_T) {
      useInvincible(); return;
    }
    touchOrigin = { x: getX(e), y: getY(e) };
    touchPos = { x: getX(e), y: getY(e) };
    touchBalloonOrigin = { x: balloon.x, y: balloon.y };
  }
  if (state === ST.PAUSE) { state = ST.PLAY; return; }
}
function ptrMove(e) {
  e.preventDefault();
  if (state === ST.PLAY && touchOrigin !== null) {
    touchPos = { x: getX(e), y: getY(e) };
  }
}
function ptrUp() { touchPos = null; touchOrigin = null; touchBalloonOrigin = null; }
canvas.addEventListener('mousedown', ptrDown);
canvas.addEventListener('mousemove', ptrMove);
canvas.addEventListener('mouseup', ptrUp);
canvas.addEventListener('touchstart', ptrDown, { passive: false });
canvas.addEventListener('touchmove', ptrMove, { passive: false });
canvas.addEventListener('touchend', ptrUp);

// ── Collision ──
function rectHit(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
}
function circHit(cx, cy, cr, bx, by, bw, bh) {
  return Math.abs(cx - (bx + bw / 2)) < bw / 2 + cr && Math.abs(cy - (by + bh / 2)) < bh / 2 + cr;
}

// ── Update ──
function update(dt) {
  if (state !== ST.PLAY) return;

  elapsed += dt;
  const tutorial = score < 10000;
  // A(12000)まで: ゆっくり固定
  // S(20000)から: 徐々に加速
  // X(80000)から: 速度上限が上昇
  if (tutorial) {
    baseSpeed = 1.8 + elapsed * 0.025;
  } else if (score < 20000) {
    baseSpeed = 2.0; // A〜Sまでは一定
  } else {
    baseSpeed = 2.0 + (score - 20000) / 8000 * 0.4 + elapsed * 0.03;
  }
  const speedCap = score < 80000 ? 6 : Math.min(6 + (score - 80000) / 10000, 14);
  scrollSpeed = Math.min(baseSpeed, tutorial ? 3.0 : speedCap);

  score += Math.round(scrollSpeed * dt * 60 * 0.3);

  // ── Keyboard movement ──
  let kbDir = 0;
  if (keys['a'] || keys['arrowleft']) kbDir -= 1;
  if (keys['d'] || keys['arrowright']) kbDir += 1;
  if (kbDir !== 0) {
    balloon.vx += kbDir * 0.7;
  }
  let kbVDir = 0;
  if (keys['w'] || keys['arrowup']) kbVDir -= 1;
  if (keys['s'] || keys['arrowdown']) kbVDir += 1;
  if (kbVDir !== 0) {
    balloon.vy += kbVDir * 0.6;
  }
  // ── Birds ──
  birdTimer += dt;
  // チュートリアル中は鳥なし。1万超えてから登場、徐々に加速して最短0.5秒
  const birdRate = tutorial ? 9999 : Math.max(0.5, 4.0 - elapsed * 0.04);

  if (birdTimer > birdRate) {
    birdTimer = 0;
    const fromRight = Math.random() < 0.5;
    const spawnY = FRAME_T + 40 + Math.random() * (BH - FRAME_T * 2 - 80);
    const peekX = fromRight ? BW + 1 : -1;
    const dx = balloon.x - peekX;
    const dy = balloon.y - spawnY;
    const dist = Math.sqrt(dx * dx + dy * dy) || 1;
    // X(80000)から突進速度が上昇
    const birdSpeedBase = score >= 80000
      ? Math.min(5.0 + (score - 80000) / 15000, 13)
      : 3.0;
    const speed = Math.min(birdSpeedBase + elapsed * 0.02 + Math.random() * 1.0, 13);
    const peekDur = 0.55 + Math.random() * 0.4;
    birds.push({
      x: fromRight ? BW + 21 : -21,
      y: spawnY,
      w: 42, h: 30,
      vx: 0, vy: 0,
      aimVx: (dx / dist) * speed,
      aimVy: (dy / dist) * speed,
      phase: 'sliding',
      phaseTimer: 0.18,
      peekX,
      peekDur,
      fromRight,
      alive: true,
    });
  }

  birds.forEach(b => {
    if (!b.alive) return;
    if (b.phase === 'sliding') {
      // 右端へ素早くスライドイン
      b.x += (b.peekX - b.x) * Math.min(1, dt * 20);
      b.phaseTimer -= dt;
      if (b.phaseTimer <= 0) {
        b.x = b.peekX;
        b.phase = 'peeking';
        b.phaseTimer = b.peekDur;
      }
    } else if (b.phase === 'peeking') {
      b.phaseTimer -= dt;
      if (b.phaseTimer <= 0) {
        b.phase = 'charging';
        b.vx = b.aimVx;
        b.vy = b.aimVy;
      }
    } else {
      b.x += b.vx * dt * 60;
      b.y += b.vy * dt * 60;
    }
  });

  birds = birds.filter(b => b.alive && b.x > -60 && b.x < BW + 60 && b.y < BH + 60 && b.y > -60);

  // 衝突（無敵中は鳥を撃破、通常時はゲームオーバー）
  const bbx = balloon.x - balloon.w / 2;
  const bby = balloon.y - balloon.h / 2;
  birds.forEach(b => {
    if (!b.alive) return;
    const bdx = balloon.x - b.x, bdy = balloon.y - b.y;
    const bdist = Math.sqrt(bdx * bdx + bdy * bdy);
    if (bdist < 14 + 11) {
      if (invincible) {
        b.alive = false;
        score += 500;
        scorePopups.push({ x: b.x, y: b.y, text: '+100', timer: 0.9 });
      } else {
        triggerDeath();
      }
    }
  });
  // Touch movement（ドラッグ量をそのまま気球位置に反映）
  if (touchPos !== null && touchOrigin !== null && touchBalloonOrigin !== null) {
    const dx = touchPos.x - touchOrigin.x;
    const dy = touchPos.y - touchOrigin.y;
    balloon.x = touchBalloonOrigin.x + dx;
    balloon.y = touchBalloonOrigin.y + dy;
    balloon.vx = 0; balloon.vy = 0;
  } else {
    balloon.vx *= 0.85;
    balloon.vy *= 0.85;
    balloon.x += balloon.vx;
    balloon.y += balloon.vy;
  }
  balloon.x = Math.max(balloon.w / 2 + FRAME_T, Math.min(BW - balloon.w / 2 - FRAME_T, balloon.x));
  balloon.y = Math.max(balloon.h / 2 + FRAME_T, Math.min(BH - balloon.h / 2 - FRAME_T, balloon.y));

  // ── Spawn platforms ──
  spawnTimer += dt;
  // チュートリアル中はプラットフォームが少ない
  const rate = tutorial ? Math.max(1.6, 3.0 - elapsed * 0.04) : Math.max(0.4, 1.3 - elapsed * 0.012);
  if (spawnTimer > rate) {
    spawnTimer = 0;
    platforms.push(mkPlatform());
  }

  // ── Spawn coins (rain-like, frequent) ──
  coinTimer += dt;
  if (coinTimer > 0.25) {
    coinTimer = 0;
    if (Math.random() < 0.65) {
      const cx = 20 + Math.random() * (BW - 40);
      coins.push(mkCoin(cx));
      // Cluster sometimes
      if (Math.random() < 0.3) {
        for (let i = 1; i < 3 + Math.floor(Math.random() * 3); i++)
          coins.push(mkCoin(cx + (Math.random() - 0.5) * 50, -14 - i * 26));
      }
    }
  }

  // ── Spawn powerups ──
  powerTimer += dt;
  // 高度が上がるほど出現間隔が伸びる（最大40秒）
  const powerBase = Math.min(6 + height * 0.018, 32);
  if (powerTimer > powerBase + Math.random() * 4) {
    powerTimer = 0;
    powerups.push(mkPowerup());
  }

  // ── Move platforms ──
  platforms.forEach(p => { p.y += scrollSpeed * dt * 60; });
  platforms = platforms.filter(p => p.y < BH + 30);

  // ── Move coins (rain: scroll + own vy) ──
  coins.forEach(c => {
    c.y += (scrollSpeed * 0.5 + c.vy) * dt * 60;
    if (magnetActive && c.alive) {
      const dx = balloon.x - c.x, dy = balloon.y - c.y;
      const d = Math.sqrt(dx * dx + dy * dy);
      if (d < 130 && d > 0) { c.x += (dx / d) * 5; c.y += (dy / d) * 5; }
    }
  });
  coins = coins.filter(c => c.alive && c.y < BH + 20);

  // ── Move powerups ──
  powerups.forEach(p => { p.y += scrollSpeed * dt * 60; });
  powerups = powerups.filter(p => p.alive && p.y < BH + 40);

  const bx = balloon.x - balloon.w / 2;
  const by = balloon.y - balloon.h / 2;

  // ── Coin collect ──
  coins.forEach(c => {
    if (c.alive && circHit(c.x, c.y, c.r, bx, by, balloon.w, balloon.h)) {
      c.alive = false;
      score += 100;
    }
  });

  // ── Powerup collect ──
  powerups.forEach(p => {
    if (p.alive && circHit(p.x, p.y, p.r, bx, by, balloon.w, balloon.h)) {
      p.alive = false;
      if (p.type === 'magnet') { magnetActive = true; magnetTimer = 7; }
      else if (p.type === 'invincible') { invStock = Math.min(invStock + 1, 1); }
      else if (p.type === 'heart') { heartStock = Math.min(heartStock + 1, 3); }
    }
  });

  // ── Platform collision ──
  // 三角ゾーン(p.y+p.h 〜 p.y+p.h+7)→死亡  バーゾーン(p.y 〜 p.y+p.h)→速度減衰
  platforms.forEach(p => {
    const hbx = bx + 6, hby = by + 6, hbw = balloon.w - 12, hbh = balloon.h - 12;
    if (rectHit(hbx, hby, hbw, hbh, p.x + 10, p.y + p.h, p.w - 20, 7)) {
      // 三角ゾーン（死亡）
      if (!invincible) {
        if (shieldActive) {
          shieldActive = false; shieldTimer = 0;
          p.y = BH + 200;
        } else {
          triggerDeath();
        }
      }
    } else if (rectHit(hbx, hby, hbw, hbh, p.x, p.y, p.w, p.h)) {
      // バーゾーン（速度落下）
      balloon.vy *= 0.2;
      balloon.vx *= 0.6;
    }
  });

  // ── Invincibility color inversion transition ──
  if (invincible) {
    invertAmount = Math.min(invertAmount + dt * 3, 1);
  } else {
    invertAmount = Math.max(invertAmount - dt * 3, 0);
  }

  // ── Timers ──
  if (magnetActive) { magnetTimer -= dt; if (magnetTimer <= 0) magnetActive = false; }
  if (invincible) {
    invTimer -= dt;
    if (invTimer <= 0) { invincible = false; nightFlash = 0.7; }
  }
  if (nightFlash > 0) nightFlash = Math.max(0, nightFlash - dt);

  // ── Score popups ──
  scorePopups.forEach(p => { p.timer -= dt; p.y -= 40 * dt; });
  scorePopups = scorePopups.filter(p => p.timer > 0);

  // ── Height ──
  height += scrollSpeed * dt * 60 * 0.15;

  // ── Night mode button animation ──
  // 右端 = nightBtnX。可視時は右フレームに右端が接する位置
  const nightBtnTarget = invStock > 0 ? BW - FRAME_T : BW + 140;
  nightBtnX += (nightBtnTarget - nightBtnX) * Math.min(1, dt * 12);
}

// ── Draw helpers ──
function drawCheckerBar(x, y, w, h) {
  ctx.save();
  // プラットフォーム幅にクリップ（三角のはみ出し防止）
  ctx.beginPath(); ctx.rect(x, y, w, h + 8); ctx.clip();

  ctx.fillStyle = invertAmount > 0.5 ? '#aaa' : '#888';
  ctx.fillRect(x, y, w, h);
  ctx.fillStyle = invertAmount > 0.5 ? '#ccc' : '#666';
  const triW = 10;
  for (let tx = x; tx < x + w; tx += triW) {
    const right = Math.min(tx + triW, x + w);
    const mid = tx + (right - tx) / 2;
    ctx.beginPath();
    ctx.moveTo(tx, y + h);
    ctx.lineTo(mid, y + h + 7);
    ctx.lineTo(right, y + h);
    ctx.fill();
  }
  ctx.fillStyle = invertAmount > 0.5 ? '#ddd' : '#555';
  ctx.fillRect(x, y, w, 3);
  ctx.restore();
}

function drawBalloonSprite(x, y, w, h, useInvFrame) {
  if (!spriteLoaded) {
    // Fallback simple draw
    ctx.fillStyle = '#888';
    ctx.beginPath();
    ctx.ellipse(x, y - h * 0.1, w * 0.4, h * 0.35, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillRect(x - 6, y + h * 0.28, 12, 10);
    return;
  }
  // Sprite: 400x300, 2 frames each 200x300
  const sx = useInvFrame ? 200 : 0;
  ctx.drawImage(spriteImg, sx, 0, 200, 300, x - w / 2, y - h / 2, w, h);
}

function drawCoin(x, y, r) {
  const c = invertAmount > 0.5 ? '#aaa' : '#555';
  ctx.strokeStyle = c;
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.stroke();
  ctx.beginPath(); ctx.arc(x, y, r * 0.5, 0, Math.PI * 2); ctx.stroke();
}

function drawMagnet(x, y, r) {
  // U文字で表現
  const c = invertAmount > 0.5 ? '#4df' : '#08c';
  ctx.save();
  ctx.fillStyle = c;
  ctx.strokeStyle = c;
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.stroke();
  ctx.font = `${Math.round(r * 0.9)}px "Press Start 2P",monospace`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('U', x, y + 1);
  ctx.textBaseline = 'alphabetic';
  ctx.restore();
}

function drawHeart(x, y, r) {
  ctx.save();
  ctx.fillStyle = '#f44';
  ctx.strokeStyle = '#c00'; ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(x, y + r * 0.5);
  ctx.bezierCurveTo(x - r * 1.1, y - r * 0.2, x - r * 1.1, y - r, x, y - r * 0.3);
  ctx.bezierCurveTo(x + r * 1.1, y - r, x + r * 1.1, y - r * 0.2, x, y + r * 0.5);
  ctx.fill(); ctx.stroke();
  ctx.restore();
}

function drawColorBall(x, y, r) {
  // Rainbow-ish circle for invincible powerup
  const colors = ['#f44', '#fa0', '#ff0', '#0c0', '#08f', '#a0f'];
  const sliceAngle = Math.PI * 2 / colors.length;
  colors.forEach((col, i) => {
    ctx.fillStyle = col;
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.arc(x, y, r, sliceAngle * i, sliceAngle * (i + 1));
    ctx.fill();
  });
  ctx.strokeStyle = '#333'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.stroke();
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

function drawNightModeButton() {
  const bw = 52, bh = 52;
  const bx = nightBtnX - bw; // 右端 = nightBtnX（フレームに接する）
  const by = BH - FRAME_T - bh; // 下端フレームにぴったり
  if (nightBtnX > BW + bw + 10) return;

  ctx.save();
  ctx.shadowColor = '#66f';
  ctx.shadowBlur = 10;
  ctx.fillStyle = '#0d0b2e';
  ctx.fillRect(bx, by, bw, bh);
  ctx.strokeStyle = '#5544cc';
  ctx.lineWidth = 2;
  ctx.strokeRect(bx, by, bw, bh);
  ctx.shadowBlur = 0;
  ctx.font = '24px sans-serif'; // 絵文字はsans-serifで描画
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('\uD83C\uDF19', bx + bw / 2, by + bh * 0.42);
  // [z]ヒント
  ctx.fillStyle = '#8888cc';
  ctx.font = '7px "Press Start 2P",monospace';
  ctx.fillText('[q]', bx + bw / 2, by + bh * 0.82);
  ctx.textBaseline = 'alphabetic';
  ctx.restore();
}

// ── Draw frame border ──
function drawFrame() {
  const fc = invertAmount > 0.5 ? '#ccc' : '#222';
  ctx.fillStyle = fc;
  ctx.fillRect(0, 0, BW, FRAME_T);          // top
  ctx.fillRect(0, BH - FRAME_T, BW, FRAME_T); // bottom
  ctx.fillRect(0, 0, FRAME_T, BH);          // left
  ctx.fillRect(BW - FRAME_T, 0, FRAME_T, BH); // right
}

// ── Main draw ──
function draw() {
  ctx.clearRect(0, 0, W, H);
  ctx.save();
  ctx.scale(S, S);

  if (state === ST.TITLE) { drawTitle(); }
  else { drawGame(); drawHUD(); drawFrame(); }
  if (state === ST.PAUSE) drawOverlay('PAUSE', 'タップ / Pキー で再開');
  if (state === ST.OVER) drawOverlay('GAME OVER', 'SCORE: ' + score + '  BEST: ' + hiScore, true);

  ctx.restore();
}

function drawTitle() {
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, BW, BH);
  if (spriteLoaded) {
    ctx.drawImage(spriteImg, 0, 0, 200, 300, BW / 2 - 40, BH * 0.28, 80, 120);
  }
  ctx.fillStyle = '#222'; ctx.textAlign = 'center';
  ctx.font = 'bold 16px "Press Start 2P",monospace';
  ctx.fillText('Hjk Balloon', BW / 2, BH * 0.18);
  ctx.font = '7px "Press Start 2P",monospace'; ctx.fillStyle = '#888';
  ctx.fillText('tap / WASD to move', BW / 2, BH * 0.24);
  ctx.font = '9px "Press Start 2P",monospace'; ctx.fillStyle = '#555';
  if (Math.sin(Date.now() * 0.004) > 0) ctx.fillText('TAP TO START', BW / 2, BH * 0.72);
  drawFrame();
}

function drawGame() {
  // Background with inversion
  const bgR = Math.round(255 * (1 - invertAmount));
  ctx.fillStyle = `rgb(${bgR},${bgR},${bgR})`;
  ctx.fillRect(0, 0, BW, BH);

  // ナイトモード終了点滅（ゆったり）
  if (nightFlash > 0) {
    const pulse = (Math.sin(nightFlash * Math.PI * 5) * 0.5 + 0.5) * (nightFlash / 0.7) * 0.22;
    ctx.fillStyle = `rgba(180,180,255,${Math.max(0, pulse).toFixed(3)})`;
    ctx.fillRect(0, 0, BW, BH);
  }

  // Platforms
  platforms.forEach(p => drawCheckerBar(p.x, p.y, p.w, p.h));

  // Coins
  coins.forEach(c => { if (c.alive) drawCoin(c.x, c.y, c.r); });

  // Powerups
  powerups.forEach(p => {
    if (!p.alive) return;
    if (p.type === 'magnet') drawMagnet(p.x, p.y, p.r);
    else if (p.type === 'invincible') drawColorBall(p.x, p.y, p.r);
    else if (p.type === 'heart') drawHeart(p.x, p.y, p.r);
  });

  // Birds
  birds.forEach(b => {
    if (!b.alive) return;

    if (birdImg.complete && birdImg.naturalWidth > 0) {
      ctx.save();
      ctx.translate(b.x, b.y);

      // 左スポーン: 先にscale(-1,1)で画像を右向きに反転
      // scale(-1,1)後のrotate(θ)は視覚的に-θになるため、
      // 左右どちらも同じ-符号（下向きaimVy>0→CCW=-角度→鼻が下）
      if (!b.fromRight) ctx.scale(-1, 1);

      const rawPitch = Math.atan2(b.aimVy, Math.abs(b.aimVx));
      const pitchAngle = -rawPitch * 0.75;

      if (b.phase === 'peeking') {
        const t = 1 - b.phaseTimer / b.peekDur;
        ctx.rotate(pitchAngle * t);
      } else if (b.phase === 'charging') {
        ctx.rotate(pitchAngle);
      }

      ctx.drawImage(birdImg, -b.w / 2, -b.h / 2, b.w, b.h);
      ctx.restore();
    } else {
      ctx.fillStyle = invertAmount > 0.5 ? '#222' : '#777';
      ctx.beginPath();
      ctx.arc(b.x, b.y, Math.max(b.w, b.h) / 2, 0, Math.PI * 2);
      ctx.fill();
    }
  });

  // Score popups
  scorePopups.forEach(p => {
    const alpha = Math.max(0, p.timer / 0.9);
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#ff0';
    ctx.strokeStyle = '#a80';
    ctx.lineWidth = 2;
    ctx.font = '10px "Press Start 2P",monospace';
    ctx.textAlign = 'center';
    ctx.strokeText(p.text, p.x, p.y);
    ctx.fillText(p.text, p.x, p.y);
    ctx.restore();
  });

  // Balloon
  drawBalloonSprite(balloon.x, balloon.y, balloon.w, balloon.h, invincible);

  // ナイトモードボタン（ゲームUI最前面）
  drawNightModeButton();
}



function drawHUD() {
  const tc = invertAmount > 0.5 ? '#ddd' : '#222';
  const tc2 = invertAmount > 0.5 ? '#aaa' : '#666';
  ctx.fillStyle = tc; ctx.textAlign = 'left';
  ctx.font = '13px "Press Start 2P",monospace';
  ctx.fillText(score, FRAME_T + 12, 30);
  ctx.font = '7px "Press Start 2P",monospace'; ctx.fillStyle = tc2;
  ctx.fillText('Hi:' + hiScore, FRAME_T + 12, 44);

  // Pause button
  ctx.fillStyle = tc;
  ctx.fillRect(BW - FRAME_T - 42, 20, 9, 22);
  ctx.fillRect(BW - FRAME_T - 28, 20, 9, 22);

  // 無敵タイマー円グラフ（上部中央）
  if (invincible) {
    const cr = 11, cx2 = BW / 2, cy2 = FRAME_T + cr + 4;
    const frac = Math.max(0, invTimer / 6);
    ctx.save();
    // 背景円
    ctx.fillStyle = 'rgba(80,60,180,0.45)';
    ctx.beginPath(); ctx.arc(cx2, cy2, cr, 0, Math.PI * 2); ctx.fill();
    // 残り時間扇形
    ctx.fillStyle = '#88f';
    ctx.beginPath();
    ctx.moveTo(cx2, cy2);
    ctx.arc(cx2, cy2, cr, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * frac);
    ctx.closePath(); ctx.fill();
    // 枠
    ctx.strokeStyle = '#bbf'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(cx2, cy2, cr, 0, Math.PI * 2); ctx.stroke();
    ctx.restore();
  }

  // ❤ ハートストック（左下）
  const sy = BH - FRAME_T - 14;
  for (let i = 0; i < 3; i++) {
    const hx = FRAME_T + 16 + i * 24;
    if (i < heartStock) {
      drawHeart(hx, sy, 9);
    } else {
      ctx.strokeStyle = '#555'; ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(hx, sy + 4);
      ctx.bezierCurveTo(hx - 9, sy - 2, hx - 9, sy - 8, hx, sy - 2);
      ctx.bezierCurveTo(hx + 9, sy - 8, hx + 9, sy - 2, hx, sy + 4);
      ctx.stroke();
    }
  }

}

// ── Score Rank ──
function getScoreRank(s) {
  if (s >= 220000) {
    // U以降は無限連番: U, U2, U3, U4...
    const uNum = Math.floor((s - 220000) / 80000) + 1;
    const rank = uNum === 1 ? 'U' : 'U' + (uNum);
    return { rank, color: '#f0f' };
  }
  if (s >= 170000) return { rank: 'XXX+', color: '#ff4' };
  if (s >= 130000) return { rank: 'XXX',  color: '#f80' }; // 人間限界
  if (s >= 100000) return { rank: 'XX',   color: '#fa4' };
  if (s >=  80000) return { rank: 'X',    color: '#fb0' };
  if (s >=  60000) return { rank: 'SSS+', color: '#8df' };
  if (s >=  45000) return { rank: 'SSS',  color: '#6cf' };
  if (s >=  30000) return { rank: 'SS',   color: '#4af' };
  if (s >=  20000) return { rank: 'S',    color: '#08f' };
  if (s >=  12000) return { rank: 'A',    color: '#4c4' };
  if (s >=   6000) return { rank: 'B',    color: '#8d8' };
  if (s >=   3000) return { rank: 'C',    color: '#cc8' };
  if (s >=   1000) return { rank: 'D',    color: '#aaa' };
  return                   { rank: 'E',    color: '#888' };
}

function drawOverlay(title, sub, showRetry) {
  ctx.fillStyle = invertAmount > 0.5 ? 'rgba(0,0,0,0.7)' : 'rgba(255,255,255,0.82)';
  ctx.fillRect(0, 0, BW, BH);
  ctx.fillStyle = invertAmount > 0.5 ? '#fff' : '#222';
  ctx.textAlign = 'center';
  ctx.font = '16px "Press Start 2P",monospace';
  ctx.fillText(title, BW / 2, BH * 0.34);
  ctx.font = '8px "Press Start 2P",monospace';
  ctx.fillStyle = invertAmount > 0.5 ? '#ccc' : '#666';
  ctx.fillText(sub, BW / 2, BH * 0.41);
  // 高さ表示
  ctx.font = '7px "Press Start 2P",monospace';
  ctx.fillStyle = invertAmount > 0.5 ? '#aaa' : '#888';
  ctx.fillText('高度  ' + Math.floor(height) + ' m　最高 ' + Math.floor(hiHeight) + ' m', BW / 2, BH * 0.47);

  if (showRetry) {
    // ランク表示
    const { rank, color } = getScoreRank(score);
    ctx.font = '7px "Press Start 2P",monospace';
    ctx.fillStyle = invertAmount > 0.5 ? '#aaa' : '#888';
    ctx.fillText('RANK', BW / 2, BH * 0.52);
    ctx.font = '26px "Press Start 2P",monospace';
    ctx.fillStyle = color;
    ctx.shadowColor = color;
    ctx.shadowBlur = 16;
    ctx.fillText(rank, BW / 2, BH * 0.62);
    ctx.shadowBlur = 0;
    if (rank === 'XXX') {
      ctx.font = '7px "Press Start 2P",monospace';
      ctx.fillStyle = invertAmount > 0.5 ? '#fa8' : '#c60';
      ctx.fillText('人間限界達成！', BW / 2, BH * 0.67);
    } else if (rank === 'XXX+' || rank === 'U' || rank === 'U2') {
      ctx.font = '7px "Press Start 2P",monospace';
      ctx.fillStyle = '#f0f';
      ctx.fillText('人間限界突破！', BW / 2, BH * 0.67);
    }

    ctx.font = '9px "Press Start 2P",monospace';
    ctx.fillStyle = invertAmount > 0.5 ? '#ddd' : '#555';
    if (Math.sin(Date.now() * 0.004) > 0) ctx.fillText('TAP TO RETRY', BW / 2, BH * 0.76);
  }
}

// ── Loop ──
let last = 0;
function loop(t) {
  const dt = Math.min((t - last) / 1000, 0.05);
  last = t;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
